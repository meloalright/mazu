# fly.toml app configuration file generated for mazu on 2026-07-23T05:54:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mazu'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  MAZU_DATA_DIR = '/data'
  PORT = '8080'

[[mounts]]
  source = 'mazu_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
